name: Build KTF-Mobile iOS IPA

on:
  push:
    branches: [ main ]
    paths: ['flutter_app/**']
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v3
        with:
          flutter-version: '3.29.2'

      - name: Generate scaffold + install
        run: |
          cd /tmp
          flutter create --project-name ktf_mobile --org com.ktf --platforms ios,web .
          cp -r /tmp/android /tmp/ios /tmp/web /tmp/test ${{ github.workspace }}/flutter_app/
          cd ${{ github.workspace }}/flutter_app
          flutter pub get

      - name: Build iOS
        working-directory: flutter_app
        run: flutter build ios --release --no-codesign

      - uses: actions/upload-artifact@v4
        with:
          name: ktf-mobile-ipa
          path: flutter_app/build/ios/iphoneos/Runner.app
          retention-days: 7

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v3
        with:
          flutter-version: '3.29.2'

      - name: Generate scaffold + install
        run: |
          cd /tmp
          flutter create --project-name ktf_mobile --org com.ktf --platforms ios,web .
          cp -r /tmp/android /tmp/ios /tmp/web /tmp/test ${{ github.workspace }}/flutter_app/
          cd ${{ github.workspace }}/flutter_app
          flutter pub get

      - name: Build Web
        working-directory: flutter_app
        run: flutter build web --release

      - uses: actions/upload-artifact@v4
        with:
          name: ktf-mobile-web
          path: flutter_app/build/web/
          retention-days: 7