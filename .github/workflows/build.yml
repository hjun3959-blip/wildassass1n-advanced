name: Build KTF-Mobile

on:
  workflow_dispatch:

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1

      - name: Install Flutter SDK
        run: |
          git clone --depth 1 -b stable https://github.com/flutter/flutter.git /opt/flutter
          echo "/opt/flutter/bin" >> $GITHUB_PATH
          dart --version
          flutter --version

      - name: Generate scaffold
        run: |
          flutter create --project-name ktf_mobile --org com.ktf /tmp/scaffold
          cp -r /tmp/scaffold/android /tmp/scaffold/ios /tmp/scaffold/web /tmp/scaffold/test flutter_app/

      - name: Build Web
        run: |
          cd flutter_app
          flutter pub get
          flutter build web --release

      - uses: actions/upload-artifact@v4
        with:
          name: ktf-mobile-web
          path: flutter_app/build/web/
          retention-days: 7