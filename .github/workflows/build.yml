name: Build KTF-Mobile

on:
  workflow_dispatch:

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        run: |
          curl -sL https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.29.2-stable.tar.xz -o /tmp/flutter.tar.xz
          tar xf /tmp/flutter.tar.xz -C /opt/
          # Fix path: the archive extracts to /opt/flutter/flutter/
          mv /opt/flutter/flutter/* /opt/flutter/ && rmdir /opt/flutter/flutter
          echo "/opt/flutter/bin" >> $GITHUB_PATH
          /opt/flutter/bin/dart --version

      - name: Generate scaffold
        run: |
          flutter config --enable-web 2>/dev/null || true
          flutter create --project-name ktf_mobile --org com.ktf /tmp/scaffold
          cp -r /tmp/scaffold/lib /tmp/scaffold/android /tmp/scaffold/ios /tmp/scaffold/web /tmp/scaffold/test flutter_app/

      - name: Build Web
        run: |
          cd flutter_app
          flutter pub get
          flutter build web --release

      - uses: actions/upload-artifact@v4
        with:
          name: ktf-mobile-web
          path: flutter_app/build/web/
          retention-days: 7

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        run: |
          curl -sL https://storage.googleapis.com/flutter_infra_release/releases/stable/macos/flutter_macos_3.29.2-stable.zip -o /tmp/flutter.zip
          unzip -q /tmp/flutter.zip -d /opt/
          mv /opt/flutter/flutter/* /opt/flutter/ && rmdir /opt/flutter/flutter
          echo "/opt/flutter/bin" >> $GITHUB_PATH
          /opt/flutter/bin/flutter --version

      - name: Generate scaffold
        run: |
          flutter config --enable-web --enable-ios 2>/dev/null || true
          flutter create --project-name ktf_mobile --org com.ktf /tmp/scaffold
          cp -r /tmp/scaffold/lib /tmp/scaffold/android /tmp/scaffold/ios /tmp/scaffold/web /tmp/scaffold/test flutter_app/

      - name: Build iOS
        run: |
          cd flutter_app
          flutter pub get
          flutter build ios --release --no-codesign

      - uses: actions/upload-artifact@v4
        with:
          name: ktf-mobile-ipa
          path: flutter_app/build/ios/iphoneos/Runner.app
          retention-days: 7