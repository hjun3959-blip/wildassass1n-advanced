name: Build KTF-Mobile iOS IPA

on:
  push:
    branches: [ main ]
    paths: ['flutter_app/**']
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: flutter_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
      - name: Generate Flutter scaffold
        run: |
          cd ..
          flutter create --project-name ktf_mobile --org com.ktf temp_scaffold
          cp -r temp_scaffold/android temp_scaffold/ios temp_scaffold/web temp_scaffold/test flutter_app/
          rm -rf temp_scaffold
      - run: flutter pub get
      - run: flutter build ios --release --no-codesign
      - uses: actions/upload-artifact@v4
        with:
          name: ktf-mobile-ipa
          path: flutter_app/build/ios/iphoneos/Runner.app
          retention-days: 7

  build-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
      - name: Generate Flutter scaffold
        run: |
          cd ..
          flutter create --project-name ktf_mobile --org com.ktf temp_scaffold
          cp -r temp_scaffold/android temp_scaffold/ios temp_scaffold/web temp_scaffold/test flutter_app/
          rm -rf temp_scaffold
      - run: flutter pub get
      - run: flutter build web --release
      - uses: actions/upload-artifact@v4
        with:
          name: ktf-mobile-web
          path: flutter_app/build/web/
          retention-days: 7
